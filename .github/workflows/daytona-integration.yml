name: Daytona Integration Tests

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      test_environment:
        description: 'Test environment'
        required: true
        default: 'cloud'
        type: choice
        options:
          - cloud
          - local

env:
  # Daytona Cloud credentials (set in GitHub secrets)
  SHARPCLAW_DAYTONA_API_KEY: ${{ secrets.SHARPCLAW_DAYTONA_API_KEY }}
  SHARPCLAW_DAYTONA_API_URL: ${{ secrets.SHARPCLAW_DAYTONA_API_URL }}
  
  # Testcontainers configuration
  TESTCONTAINERS_RYUK_DISABLED: true
  
  # .NET configuration
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'

jobs:
  test:
    name: Run Daytona Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run Daytona integration tests
        run: |
          mkdir -p TestResults
          dotnet test tests/SharpClaw.Execution.Daytona.IntegrationTests \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=daytona-tests.trx" \
            --results-directory TestResults \
            --blame-hang-timeout 10m \
            --blame-crash

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daytona-test-results
          path: TestResults/**
          retention-days: 7

      - name: Report test summary
        if: always()
        run: |
          echo "## Daytona Integration Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f TestResults/daytona-tests.trx ]; then
            total=$(grep -o 'outcome="Passed"\|outcome="Failed"\|outcome="Skipped"' TestResults/daytona-tests.trx | wc -l)
            passed=$(grep -o 'outcome="Passed"' TestResults/daytona-tests.trx | wc -l)
            failed=$(grep -o 'outcome="Failed"' TestResults/daytona-tests.trx | wc -l)
            skipped=$(grep -o 'outcome="Skipped"' TestResults/daytona-tests.trx | wc -l)
            echo "- **Total:** $total" >> $GITHUB_STEP_SUMMARY
            echo "- **Passed:** $passed" >> $GITHUB_STEP_SUMMARY
            echo "- **Failed:** $failed" >> $GITHUB_STEP_SUMMARY
            echo "- **Skipped:** $skipped" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Daytona Integration Tests Failed',
              body: 'The Daytona integration tests failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.',
              labels: ['bug', 'daytona', 'ci-failure']
            });
