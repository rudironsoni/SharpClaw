name: Daytona Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC

jobs:
  daytona-integration:
    runs-on: [self-hosted, linux, daytona]
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker availability
        # Ensure the self-hosted runner has Docker available before attempting any Docker actions or tests
        # Fail fast if the `docker` CLI is not present or not responding.
        run: |
          set -e
          echo "Checking docker availability..."
          docker version

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          # Use .NET 10 for the Daytona integration suite. If you prefer to pin using global.json,
          # use that instead and the tool will respect it when running locally.
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln', '**/global.json') }}-daytona
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run full integration test suite (Daytona)
        # This job runs the full integration suite that may start docker containers,
        # provision external emulators, and exercise long-running scenarios.
        run: |
          mkdir -p TestResults
          dotnet test --no-build --configuration Release --logger "trx;LogFileName=TestResults/daytona.trx" \
            --results-directory TestResults --filter "Category=DaytonaIntegration"

      - name: Upload logs and results
        # Only upload artifacts when the run failed or was cancelled to avoid unnecessary storage on success.
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: daytona-test-results
          path: TestResults/**
