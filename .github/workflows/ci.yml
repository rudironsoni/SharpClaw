name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln', '**/global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run ALL tests with coverage
        run: |
          mkdir -p TestResults
          dotnet test --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory TestResults \
            --blame-hang-timeout 30m \
            --blame-crash \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings

      - name: Check code coverage threshold
        run: |
          echo "## Code Coverage" >> $GITHUB_STEP_SUMMARY
          coverage_files=$(find TestResults -name "coverage.cobertura.xml" -type f)
          if [ -n "$coverage_files" ]; then
            total_lines=0
            covered_lines=0
            for file in $coverage_files; do
              file_covered=$(grep -oP 'line-rate="\K[0-9.]+' "$file" | head -1)
              file_lines=$(grep -oP 'lines-valid="\K[0-9]+' "$file" | head -1)
              if [ -n "$file_covered" ] && [ -n "$file_lines" ]; then
                covered_lines=$(echo "$covered_lines + ($file_lines * $file_covered)" | bc)
                total_lines=$(echo "$total_lines + $file_lines" | bc)
              fi
            done
            if [ "$total_lines" -gt 0 ]; then
              coverage_percent=$(echo "scale=2; ($covered_lines / $total_lines) * 100" | bc)
              echo "**Overall Coverage:** ${coverage_percent}%" >> $GITHUB_STEP_SUMMARY
              
              # Check 80% threshold
              if (( $(echo "$coverage_percent < 80" | bc -l) )); then
                echo "::error::Code coverage ${coverage_percent}% is below 80% threshold"
                exit 1
              fi
            fi
          else
            echo "No coverage files found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**
          retention-days: 7

      - name: Report test summary
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f TestResults/test-results.trx ]; then
            total=$(grep -o 'outcome="Passed"\|outcome="Failed"\|outcome="Skipped"' TestResults/test-results.trx | wc -l)
            passed=$(grep -o 'outcome="Passed"' TestResults/test-results.trx | wc -l)
            failed=$(grep -o 'outcome="Failed"' TestResults/test-results.trx | wc -l)
            skipped=$(grep -o 'outcome="Skipped"' TestResults/test-results.trx | wc -l)
            echo "- **Total:** $total" >> $GITHUB_STEP_SUMMARY
            echo "- **Passed:** $passed" >> $GITHUB_STEP_SUMMARY
            echo "- **Failed:** $failed" >> $GITHUB_STEP_SUMMARY
            echo "- **Skipped:** $skipped" >> $GITHUB_STEP_SUMMARY
          fi