name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        # Integration tests require Docker containers - free up space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln', '**/global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run ALL tests
        run: |
          mkdir -p TestResults
          dotnet test --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory TestResults \
            --blame-hang-timeout 30m \
            --blame-crash

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**
          retention-days: 7

      - name: Report test summary
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f TestResults/test-results.trx ]; then
            total=$(grep -o 'outcome="Passed"\|outcome="Failed"\|outcome="Skipped"' TestResults/test-results.trx | wc -l)
            passed=$(grep -o 'outcome="Passed"' TestResults/test-results.trx | wc -l)
            failed=$(grep -o 'outcome="Failed"' TestResults/test-results.trx | wc -l)
            skipped=$(grep -o 'outcome="Skipped"' TestResults/test-results.trx | wc -l)
            echo "- **Total:** $total" >> $GITHUB_STEP_SUMMARY
            echo "- **Passed:** $passed" >> $GITHUB_STEP_SUMMARY
            echo "- **Failed:** $failed" >> $GITHUB_STEP_SUMMARY
            echo "- **Skipped:** $skipped" >> $GITHUB_STEP_SUMMARY
          fi