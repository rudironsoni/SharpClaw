name: CI (build + filtered tests)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          # Use .NET 10 for CI. If your repo relies on global.json locally, that will take precedence for developers.
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln', '**/global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit and short tests (integration skipped)
        env:
          SKIP_DAYTONA_INTEGRATION: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        # When SKIP_DAYTONA_INTEGRATION=true we run the filtered fast test set that excludes
        # tests requiring external infrastructure. Otherwise run the full test suite.
        run: |
          mkdir -p TestResults
            # Make SKIP_DAYTONA_INTEGRATION check case-insensitive
            if [ "${SKIP_DAYTONA_INTEGRATION,,}" = "true" ]; then
              dotnet test --no-build --configuration Release --logger "trx;LogFileName=TestResults/test_results.trx" \
                --results-directory TestResults --filter "Category!=ExternalInfrastructure&Category!=SlowIntegration&Category!=ContainerizedMock"
          else
              dotnet test --no-build --configuration Release --logger "trx;LogFileName=TestResults/test_results.trx" \
                --results-directory TestResults
          fi

      - name: Upload test results on failure or cancellation
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**
