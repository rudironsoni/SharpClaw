name: CI (build + filtered tests)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          # Default to .NET 7; if your repo uses a global.json it will take precedence when developers run locally.
          dotnet-version: '7.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln', '**/global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit and short tests (integration skipped)
        # We exclude tests that require external infra, docker, or are slow integration suite.
        run: |
          mkdir -p TestResults
          dotnet test --no-build --configuration Release --logger "trx;LogFileName=TestResults/test_results.trx" \
            --results-directory TestResults --filter "Category!=ExternalInfrastructure&Category!=SlowIntegration&Category!=ContainerizedMock"

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**
