services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sharpclaw
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: sharpclawdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharpclaw -d sharpclawdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sharpclaw-host:
    build:
      context: .
      dockerfile: Dockerfile
    image: sharpclaw-host:latest
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=sharpclawdb;Username=sharpclaw;Password=mysecretpassword
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
