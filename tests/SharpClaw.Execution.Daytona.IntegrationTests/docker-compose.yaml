name: daytona-test
services:
  api:
    image: daytonaio/daytona-api:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=user
      - DB_PASSWORD=pass
      - DB_DATABASE=daytona
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OIDC_CLIENT_ID=daytona
      - OIDC_ISSUER_BASE_URL=http://dex:5556/dex
      - PUBLIC_OIDC_DOMAIN=http://localhost:5556/dex
      - OIDC_AUDIENCE=daytona
      - DASHBOARD_URL=http://localhost:3000/dashboard
      - DASHBOARD_BASE_API_URL=http://localhost:3000
      - DEFAULT_SNAPSHOT=daytonaio/sandbox:0.5.0-slim
      - ENCRYPTION_KEY=0123456789abcdef0123456789abcdef
      - ENCRYPTION_SALT=0123456789abcdef
      - ENVIRONMENT=docker-compose
      - MAX_AUTO_ARCHIVE_INTERVAL=43200
      - MAINTENANCE_MODE=false
      - PROXY_DOMAIN=localhost:4000
      - PROXY_PROTOCOL=http
      - PROXY_API_KEY=super_secret_key
      - DEFAULT_RUNNER_DOMAIN=runner:3003
      - DEFAULT_RUNNER_API_URL=http://runner:3003
      - DEFAULT_RUNNER_API_KEY=secret_api_token
      - SKIP_USER_EMAIL_VERIFICATION=true
      - RUN_MIGRATIONS=true
    networks:
      - daytona-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      dex:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  proxy:
    image: daytonaio/daytona-proxy:latest
    ports:
      - "4000:4000"
    environment:
      - DAYTONA_API_URL=http://api:3000/api
      - PROXY_PORT=4000
      - PROXY_API_KEY=super_secret_key
      - PROXY_PROTOCOL=http
      - OIDC_CLIENT_ID=daytona
      - OIDC_DOMAIN=http://dex:5556/dex
      - OIDC_AUDIENCE=daytona
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - daytona-network
    depends_on:
      api:
        condition: service_healthy

  runner:
    image: daytonaio/daytona-runner:latest
    ports:
      - "3003:3003"
    environment:
      - ENVIRONMENT=development
      - API_PORT=3003
      - DAYTONA_RUNNER_TOKEN=secret_api_token
      - DAYTONA_API_URL=http://api:3000/api
      - RUNNER_DOMAIN=runner
      - RESOURCE_LIMITS_DISABLED=true
    networks:
      - daytona-network
    depends_on:
      api:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD=pass
      - POSTGRES_USER=user
      - POSTGRES_DB=daytona
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - daytona-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d daytona"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - daytona-network

  dex:
    image: dexidp/dex:v2.42.0
    volumes:
      - ./dex-config.yaml:/etc/dex/config.yaml:ro
    entrypoint: ["dex", "serve", "/etc/dex/config.yaml"]
    networks:
      - daytona-network
    ports:
      - "5556:5556"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:5556/dex/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 5

  registry:
    image: registry:2.8.3
    environment:
      - REGISTRY_HTTP_ADDR=registry:6000
      - REGISTRY_STORAGE_DELETE_ENABLED=true
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - daytona-network
    ports:
      - "6000:6000"

networks:
  daytona-network:
    driver: bridge

volumes:
  db_data:
  registry_data:
